<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>My E-Commerce Store</h1>
        <div id="cart-count">Cart: 0</div>
    </header>

    <main>
        <section id="products"></section>

        <section id="cart">
            <h2>Cart</h2>
            <ul id="cart-items"></ul>
            <button id="checkout-btn">Checkout</button>
        </section>
        <!-- Checkout Modal -->
        <div id="checkout-modal" class="modal hidden">
            <div class="modal-content form-container">
                <span id="close-modal">&times;</span>
                <h2>Complete Your Order</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <label for="checkout-phone">Phone Number *</label>
                        <input type="text" id="checkout-phone" placeholder="e.g. +1 234 567 8900" required>
                        <small class="error-msg" id="phone-error"></small>
                    </div>

                    <div class="form-group">
                        <label for="checkout-street">Street Address *</label>
                        <input type="text" id="checkout-street" placeholder="123 Main St" required>
                    </div>

                    <div class="form-group-row">
                        <div class="form-group half">
                            <label for="checkout-district">District *</label>
                            <input type="text" id="checkout-district" placeholder="Downtown" required>
                        </div>
                        <div class="form-group half">
                            <label for="checkout-city">City *</label>
                            <input type="text" id="checkout-city" placeholder="New York" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="checkout-postal">Postal Code</label>
                        <input type="text" id="checkout-postal" placeholder="10001">
                    </div>

                    <button type="submit" id="submit-order-btn">Confirm Purchase</button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
