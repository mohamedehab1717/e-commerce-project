services:
  # Web Service (Backend + Frontend)
  - type: web
    name: ecommerce-app
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: ecommerce-app
          property: port
      # Database credentials - Set these manually in Render dashboard
      # Get them from your external MySQL service (PlanetScale, Railway, etc.)
      - key: DB_HOST
        sync: false  # Set manually in dashboard
      - key: DB_USER
        sync: false  # Set manually in dashboard
      - key: DB_PASSWORD
        sync: false  # Set manually in dashboard
      - key: DB_NAME
        value: ecommerce_db
      - key: JWT_SECRET
        generateValue: true

